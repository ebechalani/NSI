<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Évite que le navigateur garde une ancienne version de la page (sinon les mises à jour ne s'affichent pas) -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>NSI Première — Cours interactif</title>
  <meta name="description" content="Site interactif pour apprendre la NSI en Première : cours, code Python exécutable et QCM. Conforme au programme officiel (BO)." />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="assets/css/style.css?v=60" />
</head>
<body>
  <a class="skip-link" href="#contenu">Aller au contenu</a>

  <header class="topbar">
    <button id="menuToggle" class="menu-toggle" aria-label="Ouvrir le menu">☰</button>
    <div class="brand">
      <span class="brand-logo">&lt;/&gt;</span>
      <span class="brand-title">NSI&nbsp;<small>Première</small></span>
    </div>
    <div class="search-wrap">
      <input id="searchInput" type="search" class="search-input"
             placeholder="🔎 Rechercher (cours, glossaire, projets)…"
             aria-label="Recherche dans le site" autocomplete="off" />
      <div id="searchResults" class="search-results hidden"></div>
    </div>
    <div class="topbar-spacer"></div>
    <div class="progress-wrap" title="Progression des QCM">
      <div class="progress-bar"><span id="globalProgress"></span></div>
      <span id="globalProgressLabel" class="progress-label">0 %</span>
    </div>
    <button id="levelToggle" class="icon-btn level-toggle" aria-label="Changer de niveau (Première / Terminale)" title="Changer de niveau">🎓&nbsp;<span id="levelLabel">Première</span></button>
    <button id="teacherToggle" class="icon-btn" aria-label="Activer le mode professeur" title="Mode professeur (corrigés)">👩‍🏫</button>
    <button id="themeToggle" class="icon-btn" aria-label="Basculer le thème clair/sombre">🌙</button>
    <div id="accountBox" class="account-box"></div>
  </header>

  <div id="authGate" class="auth-gate hidden"></div>

  <div class="layout">
    <nav id="sidebar" class="sidebar" aria-label="Sommaire des thèmes">
      <div class="sidebar-head">Sommaire</div>
      <ul id="navList" class="nav-list"></ul>
      <div class="sidebar-foot">
        <p>Conforme au programme officiel de Première NSI (Bulletin officiel).</p>
      </div>
    </nav>

    <main id="contenu" class="content" tabindex="-1">
      <section id="view-home" class="view"></section>
      <section id="view-theme" class="view hidden"></section>
    </main>
  </div>

  <div id="overlay" class="overlay hidden"></div>

  <!-- Données du cours, QCM, projets, glossaire, compléments -->
  <!-- ?v=N : pense à incrémenter N après une mise à jour pour forcer le rechargement chez les élèves -->
  <!-- Le NIVEAU choisi (Première / Terminale) décide quel jeu de contenu charger.
       Première : assets/js/*.js  —  Terminale : assets/js/terminale/*.js
       Choix du niveau, par ordre de priorité :
         1. le paramètre d'URL ?niveau=terminale (ou ?niveau=premiere) → lien direct partageable ;
         2. sinon, le dernier niveau mémorisé dans le navigateur ;
         3. sinon, Première par défaut.
       Le bouton 🎓 de la barre permet aussi de basculer à tout moment. -->
  <script>
    (function () {
      var param = (new URLSearchParams(location.search).get("niveau") || "").toLowerCase();
      var niveau;
      if (param === "terminale" || param === "premiere") {
        niveau = param;
        localStorage.setItem("nsi-niveau", niveau); // un lien direct mémorise le niveau
      } else {
        niveau = localStorage.getItem("nsi-niveau") === "terminale" ? "terminale" : "premiere";
      }
      window.NSI_NIVEAU = niveau;
      var base = niveau === "terminale" ? "assets/js/terminale/" : "assets/js/";
      var v = "60";
      ["courses", "quizzes", "exercises", "projects", "glossary", "resources", "tp"].forEach(function (f) {
        document.write('<script src="' + base + f + ".js?v=" + v + '"><\/script>');
      });
    })();
  </script>
  <!-- Firebase (synchro prof ↔ élèves). SDK compat puis config. -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="assets/js/firebase-config.js?v=60"></script>
  <!-- Plateforme (comptes, rôles, classes) -->
  <script src="assets/js/platform.js?v=60"></script>
  <!-- Logique applicative -->
  <script src="assets/js/app.js?v=60"></script>
</body>
</html>
